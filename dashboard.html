<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard BTG Seguros</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--dark:#030d1a;--blue:#1A7FBC;--font:'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif}
  html,body{height:100%;background:var(--dark);font-family:var(--font);color:#E4EEF5}

  /* NAV */
  .dash-nav{display:flex;align-items:center;gap:14px;padding:14px 20px;background:var(--dark);border-bottom:1px solid rgba(26,127,188,0.15);position:sticky;top:0;z-index:100}
  .dash-back{display:flex;align-items:center;gap:6px;color:rgba(228,238,245,0.55);font-size:14px;font-weight:500;text-decoration:none;padding:8px 12px;border-radius:10px;border:1px solid rgba(26,127,188,0.2);background:rgba(26,127,188,0.08);transition:background .2s,color .2s;flex-shrink:0}
  .dash-back:active{background:rgba(26,127,188,0.18);color:#E4EEF5}
  .dash-back svg{flex-shrink:0}
  .dash-title{font-size:15px;font-weight:600;letter-spacing:-.02em;flex:1;text-align:center;padding-right:80px}

  /* IFRAME CONTAINER */
  .iframe-container{width:100%;overflow:hidden;position:relative}
  .iframe-container iframe{border:none;width:1920px;height:1050px;transform-origin:top left;display:block}

  /* Desktop grande */
  @media(min-width:1200px){
    .iframe-container{height:calc(1050px * 0.68)}
    .iframe-container iframe{transform:scale(0.68)}
    .dash-nav{padding:14px 40px}
    .dash-title{font-size:17px}
  }

  /* Desktop estándar / laptop */
  @media(min-width:1025px) and (max-width:1199px){
    .iframe-container{height:calc(1050px * 0.63)}
    .iframe-container iframe{transform:scale(0.63)}
    .dash-nav{padding:14px 32px}
  }

  /* Tablets horizontales */
  @media(max-width:1024px) and (min-width:768px){
    .iframe-container{height:calc(1150px * 0.37)}
    .iframe-container iframe{height:1150px;transform:scale(0.37)}
  }

  /* Móviles */
  @media(max-width:767px){
    .iframe-container{height:calc(1150px * 0.27)}
    .iframe-container iframe{height:1150px;transform:scale(0.27)}
    .dash-title{font-size:13px;padding-right:60px}
  }

  /* Loading state */
  .iframe-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--dark);pointer-events:none;transition:opacity .4s}
  .iframe-loading.hidden{opacity:0}
  .loader-ring{width:36px;height:36px;border:3px solid rgba(26,127,188,0.2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loader-text{font-size:12px;color:rgba(228,238,245,0.35);letter-spacing:.04em}
</style>
</head>
<body>

<nav class="dash-nav">
  <a href="index.html" class="dash-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Regresar
  </a>
  <span class="dash-title">Dashboard de producción</span>
</nav>

<div class="iframe-container" id="iframeWrap">
  <div class="iframe-loading" id="iframeLoading">
    <div class="loader-ring"></div>
    <span class="loader-text">Cargando dashboard…</span>
  </div>
  <iframe
    src="https://app.powerbi.com/reportEmbed?reportId=364dac58-db8b-4803-869b-cc80a945fee4&autoAuth=true&ctid=384b46fe-6594-46a0-8247-dcc5a526b6fa"
    allowfullscreen
    id="dashFrame"
    onload="document.getElementById('iframeLoading').classList.add('hidden')">
  </iframe>
</div>

</body>
</html>
