<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard BTG Seguros</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--dark:#030d1a;--blue:#1A7FBC;--cyan:#00C9E0;--nav-h:52px;--font:'Inter','SF Pro Display',-apple-system,BlinkMacSystemFont,sans-serif}
  html,body{height:100%;overflow:hidden;background:var(--dark);font-family:var(--font);color:#E4EEF5}

  /* NAV */
  .dash-nav{
    position:fixed;top:0;left:0;right:0;height:var(--nav-h);
    display:flex;align-items:center;gap:14px;padding:0 20px;
    background:var(--dark);border-bottom:1px solid rgba(26,127,188,0.18);z-index:200;
  }
  .dash-back{
    display:flex;align-items:center;gap:6px;color:rgba(228,238,245,0.6);
    font-size:14px;font-weight:500;text-decoration:none;padding:7px 12px;
    border-radius:10px;border:1px solid rgba(26,127,188,0.22);
    background:rgba(26,127,188,0.08);transition:background .18s,color .18s;flex-shrink:0;
  }
  .dash-back:active,.dash-back:hover{background:rgba(26,127,188,0.2);color:#E4EEF5}
  .dash-title{flex:1;text-align:center;font-size:15px;font-weight:600;letter-spacing:-.02em}

  /* IFRAME — desktop */
  .dash-frame-wrap{
    position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;overflow:hidden;
  }
  .dash-frame-wrap iframe{width:100%;height:100%;border:none;display:block}

  /* Loading overlay */
  .dash-loading{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:14px;
    background:var(--dark);transition:opacity .5s;z-index:10;
  }
  .dash-loading.hidden{opacity:0;pointer-events:none}
  .loader-ring{
    width:38px;height:38px;border:3px solid rgba(26,127,188,0.18);
    border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .loader-text{font-size:12px;color:rgba(228,238,245,0.3);letter-spacing:.05em}

  /* MOBILE FALLBACK */
  .dash-mobile{
    display:none;
    position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;
    flex-direction:column;align-items:center;justify-content:center;
    padding:32px 24px;gap:0;text-align:center;
    background:linear-gradient(160deg,#030d1a 0%,#071829 60%,#091f35 100%);
  }

  /* Glow orb */
  .mob-orb{
    width:120px;height:120px;border-radius:50%;
    background:radial-gradient(circle at 38% 36%,rgba(26,127,188,0.35),rgba(0,201,224,0.08) 60%,transparent 100%);
    border:1px solid rgba(26,127,188,0.2);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:28px;
    box-shadow:0 0 40px rgba(26,127,188,0.18),inset 0 0 30px rgba(0,201,224,0.06);
  }
  .mob-orb svg{opacity:.85}

  .mob-title{font-size:22px;font-weight:700;letter-spacing:-.03em;margin-bottom:10px;line-height:1.2}
  .mob-desc{font-size:14px;font-weight:300;color:rgba(228,238,245,0.42);line-height:1.65;max-width:280px;margin-bottom:36px}

  /* CTA button */
  .mob-cta{
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;max-width:320px;padding:17px 24px;
    background:linear-gradient(135deg,#0d5c8a,#1A7FBC);
    color:#fff;font-size:16px;font-weight:700;letter-spacing:.03em;
    text-decoration:none;border-radius:16px;
    box-shadow:0 6px 28px rgba(26,127,188,0.45);
    transition:transform .18s,box-shadow .18s;
  }
  .mob-cta:active{transform:scale(0.97);box-shadow:0 3px 14px rgba(26,127,188,0.35)}

  /* Note */
  .mob-note{margin-top:18px;font-size:11px;color:rgba(228,238,245,0.22);letter-spacing:.03em}

  @media(max-width:768px){
    .dash-frame-wrap{display:none}
    .dash-mobile{display:flex}
    .dash-title{font-size:13px}
    .dash-nav .dash-open{display:none}
  }

  @media(min-width:769px){
    .dash-nav{padding:0 40px}
    .dash-title{font-size:17px}
  }
</style>
</head>
<body>

<nav class="dash-nav">
  <a href="index.html" class="dash-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Regresar
  </a>
  <span class="dash-title">Dashboard de producción</span>
</nav>

<!-- DESKTOP: iframe embebido -->
<div class="dash-frame-wrap">
  <div class="dash-loading" id="dashLoading">
    <div class="loader-ring"></div>
    <span class="loader-text">Cargando dashboard…</span>
  </div>
  <iframe
    src="https://app.powerbi.com/reportEmbed?reportId=364dac58-db8b-4803-869b-cc80a945fee4&autoAuth=true&ctid=384b46fe-6594-46a0-8247-dcc5a526b6fa"
    allowfullscreen
    id="dashFrame"
    onload="document.getElementById('dashLoading').classList.add('hidden')">
  </iframe>
</div>

<!-- MÓVIL: acceso directo -->
<div class="dash-mobile">
  <div class="mob-orb">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="rgba(0,201,224,0.9)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <polyline points="14 17 16 19 20 15"/>
    </svg>
  </div>
  <p class="mob-title">Tu Dashboard<br>de producción</p>
  <p class="mob-desc">Composición de cartera, avance a convención, bono BTG y siniestros activos — todo en tiempo real.</p>
  <a href="https://app.powerbi.com/reportEmbed?reportId=364dac58-db8b-4803-869b-cc80a945fee4&autoAuth=true&ctid=384b46fe-6594-46a0-8247-dcc5a526b6fa" target="_blank" class="mob-cta">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
    Abrir Dashboard
  </a>
  <p class="mob-note">Se abrirá en tu navegador · Inicia sesión con tu cuenta BTG</p>
</div>

</body>
</html>
